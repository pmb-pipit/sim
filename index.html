<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMB Pipit Uly Arta</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #C8556A;
    --rose-light: #E8899A;
    --rose-dark: #9B3A4E;
    --rose-pale: #FDF0F2;
    --rose-muted: #F5D5DA;
    --teal: #2E8B7A;
    --teal-light: #4AAFA0;
    --teal-pale: #EAF6F4;
    --gold: #C9A84C;
    --gold-pale: #FBF5E6;
    --navy: #1A2B4A;
    --navy-mid: #2D4270;
    --text: #1E1E2E;
    --text-muted: #6B6B80;
    --bg: #FAFAF9;
    --white: #FFFFFF;
    --border: #E8E8F0;
    --shadow: 0 2px 16px rgba(26,43,74,0.08);
    --shadow-lg: 0 8px 32px rgba(26,43,74,0.14);
    --radius: 12px;
    --radius-lg: 18px;
    --sidebar-w: 250px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background: linear-gradient(135deg, #FDF0F2 0%, #EAF6F4 50%, #FBF5E6 100%);
    position:relative; overflow:hidden;
  }
  #login-screen::before {
    content:''; position:absolute; width:600px; height:600px; border-radius:50%;
    background: radial-gradient(circle, rgba(200,85,106,0.08) 0%, transparent 70%);
    top:-150px; right:-150px; pointer-events:none;
  }
  #login-screen::after {
    content:''; position:absolute; width:400px; height:400px; border-radius:50%;
    background: radial-gradient(circle, rgba(46,139,122,0.08) 0%, transparent 70%);
    bottom:-100px; left:-100px; pointer-events:none;
  }
  .login-card {
    background:var(--white); border-radius:24px; padding:48px 44px;
    box-shadow:0 20px 60px rgba(26,43,74,0.12); width:420px; max-width:95vw;
    position:relative; z-index:1; animation:fadeUp 0.5s ease;
  }
  .login-logo { text-align:center; margin-bottom:32px; }
  .login-logo .icon-wrap {
    width:72px; height:72px; background:linear-gradient(135deg,var(--rose),var(--rose-dark));
    border-radius:20px; display:inline-flex; align-items:center; justify-content:center;
    margin-bottom:16px; box-shadow:0 8px 24px rgba(200,85,106,0.3);
  }
  .login-logo .icon-wrap svg { width:36px; height:36px; fill:white; }
  .login-logo h1 { font-family:'Lora',serif; font-size:1.5rem; font-weight:600; color:var(--navy); line-height:1.3; }
  .login-logo p { color:var(--text-muted); font-size:0.82rem; margin-top:4px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:0.82rem; font-weight:600; color:var(--text); margin-bottom:7px; letter-spacing:0.02em; }
  .form-group input {
    width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:10px;
    font-family:inherit; font-size:0.9rem; color:var(--text); background:var(--bg); transition:all 0.2s;
  }
  .form-group input:focus { outline:none; border-color:var(--rose); box-shadow:0 0 0 3px rgba(200,85,106,0.12); background:white; }
  .btn-login {
    width:100%; padding:13px; background:linear-gradient(135deg,var(--rose),var(--rose-dark));
    color:white; border:none; border-radius:10px; font-family:inherit; font-size:0.95rem;
    font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:6px;
    box-shadow:0 4px 16px rgba(200,85,106,0.35);
  }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(200,85,106,0.45); }
  .login-error { color:var(--rose-dark); font-size:0.82rem; text-align:center; margin-top:10px; display:none; }

  /* ===== LAYOUT ===== */
  #app { display:none; min-height:100vh; flex-direction:row; }
  #app.active { display:flex; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width:var(--sidebar-w); min-height:100vh; background:var(--navy);
    display:flex; flex-direction:column; position:fixed; left:0; top:0; z-index:100;
    box-shadow:4px 0 20px rgba(26,43,74,0.15);
  }
  .sidebar-brand {
    padding:24px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; gap:12px;
  }
  .sidebar-brand .brand-icon {
    width:40px; height:40px; background:linear-gradient(135deg,var(--rose),var(--rose-dark));
    border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .sidebar-brand .brand-icon svg { width:20px; height:20px; fill:white; }
  .sidebar-brand .brand-text h2 { font-family:'Lora',serif; font-size:0.88rem; font-weight:600; color:white; line-height:1.3; }
  .sidebar-brand .brand-text span { font-size:0.72rem; color:rgba(255,255,255,0.5); }
  .sidebar-nav { flex:1; padding:16px 0; overflow-y:auto; }
  .nav-section { padding:10px 20px 6px; font-size:0.68rem; font-weight:700; color:rgba(255,255,255,0.35); letter-spacing:0.1em; text-transform:uppercase; }
  .nav-item {
    display:flex; align-items:center; gap:10px; padding:9px 20px;
    color:rgba(255,255,255,0.65); cursor:pointer; transition:all 0.2s;
    font-size:0.85rem; font-weight:500; position:relative;
    border:none; background:none; width:100%; text-align:left;
  }
  .nav-item svg { width:17px; height:17px; flex-shrink:0; opacity:0.8; }
  .nav-item:hover { color:white; background:rgba(255,255,255,0.06); }
  .nav-item.active { color:white; background:rgba(200,85,106,0.2); }
  .nav-item.active::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; background:var(--rose); border-radius:0 2px 2px 0; }
  .nav-item.active svg { opacity:1; }
  .sidebar-user {
    padding:16px 20px; border-top:1px solid rgba(255,255,255,0.08);
    display:flex; align-items:center; gap:10px;
  }
  .user-avatar {
    width:34px; height:34px; border-radius:50%;
    background:linear-gradient(135deg,var(--teal),var(--teal-light));
    display:flex; align-items:center; justify-content:center;
    color:white; font-weight:700; font-size:0.82rem; flex-shrink:0;
  }
  .user-info { flex:1; min-width:0; }
  .user-info .uname { font-size:0.82rem; font-weight:600; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-info .urole { font-size:0.7rem; color:rgba(255,255,255,0.4); }
  .btn-logout { background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer; padding:4px; transition:color 0.2s; flex-shrink:0; }
  .btn-logout:hover { color:var(--rose-light); }
  .btn-logout svg { width:16px; height:16px; }

  /* ===== MAIN ===== */
  .main { margin-left:var(--sidebar-w); flex:1; display:flex; flex-direction:column; min-height:100vh; }
  .topbar {
    background:white; border-bottom:1px solid var(--border); padding:0 28px;
    height:60px; display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:50;
  }
  .topbar-title { font-size:1rem; font-weight:700; color:var(--navy); }
  .topbar-right { display:flex; align-items:center; gap:12px; }
  .topbar-date { font-size:0.78rem; color:var(--text-muted); }
  .badge-notif {
    background:var(--rose); color:white; font-size:0.7rem; font-weight:700;
    padding:2px 7px; border-radius:20px; cursor:pointer; display:none;
  }
  #content-area { padding:28px; flex:1; animation:fadeUp 0.3s ease; }

  /* ===== DASHBOARD ===== */
  .dash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; margin-bottom:28px; }
  .stat-card {
    background:white; border-radius:var(--radius-lg); padding:22px 22px 18px;
    box-shadow:var(--shadow); border:1px solid var(--border); position:relative; overflow:hidden;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }
  .stat-card::after { content:''; position:absolute; top:0; right:0; width:80px; height:80px; border-radius:0 0 0 80px; opacity:0.06; }
  .stat-card.rose::after { background:var(--rose); }
  .stat-card.teal::after { background:var(--teal); }
  .stat-card.gold::after { background:var(--gold); }
  .stat-card.navy::after { background:var(--navy); }
  .stat-icon { width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
  .stat-icon svg { width:22px; height:22px; }
  .stat-card.rose .stat-icon { background:var(--rose-pale); }
  .stat-card.rose .stat-icon svg { color:var(--rose); }
  .stat-card.teal .stat-icon { background:var(--teal-pale); }
  .stat-card.teal .stat-icon svg { color:var(--teal); }
  .stat-card.gold .stat-icon { background:var(--gold-pale); }
  .stat-card.gold .stat-icon svg { color:var(--gold); }
  .stat-card.navy .stat-icon { background:#EEF1F7; }
  .stat-card.navy .stat-icon svg { color:var(--navy); }
  .stat-value { font-size:2rem; font-weight:800; color:var(--navy); line-height:1; }
  .stat-label { font-size:0.78rem; color:var(--text-muted); margin-top:4px; font-weight:500; }
  .stat-sub { font-size:0.72rem; color:var(--text-muted); margin-top:8px; }
  .section-title { font-family:'Lora',serif; font-size:1.1rem; font-weight:600; color:var(--navy); margin-bottom:16px; }
  .service-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:28px; }
  .service-stat {
    background:white; border-radius:var(--radius); padding:16px; text-align:center;
    box-shadow:var(--shadow); border:1px solid var(--border); cursor:pointer; transition:all 0.2s;
  }
  .service-stat:hover { border-color:var(--rose); }
  .service-stat .sname { font-size:0.75rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em; }
  .service-stat .sval { font-size:1.5rem; font-weight:800; color:var(--navy); margin-top:4px; }
  .bumil-section { background:white; border-radius:var(--radius-lg); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .bumil-list { display:grid; gap:10px; margin-top:12px; }
  .bumil-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--rose-pale); border-radius:10px; }
  .bumil-avatar { width:36px; height:36px; border-radius:50%; background:var(--rose); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.82rem; flex-shrink:0; }
  .bumil-info .bname { font-size:0.85rem; font-weight:600; color:var(--navy); }
  .bumil-info .bdetail { font-size:0.75rem; color:var(--text-muted); }
  .bumil-usia { margin-left:auto; font-size:0.75rem; font-weight:700; color:var(--rose); background:white; padding:3px 10px; border-radius:20px; }

  /* ===== INPUT PASIEN ===== */
  .svc-side-btn {
    padding:11px 16px; border-radius:10px; font-size:0.85rem; font-weight:700;
    cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--navy);
    transition:all 0.2s; box-shadow:var(--shadow); text-align:left; width:100%;
  }
  .svc-side-btn:hover, .svc-side-btn.active {
    border-color:var(--rose); background:var(--rose-pale); color:var(--rose-dark);
  }
  .form-card { background:white; border-radius:var(--radius-lg); padding:24px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .form-section-title { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; color:var(--rose); border-bottom:1px solid var(--rose-muted); padding-bottom:6px; margin:12px 0 8px; }
  .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px; }
  .form-group { display:flex; flex-direction:column; gap:3px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { font-size:0.78rem; font-weight:600; color:var(--text); }
  .form-group label .req { color:var(--rose); margin-left:2px; }
  .form-group input, .form-group select, .form-group textarea {
    padding:8px 12px; border:1.5px solid var(--border); border-radius:9px;
    font-family:inherit; font-size:0.85rem; color:var(--text); background:var(--bg); transition:all 0.2s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--rose); background:white; box-shadow:0 0 0 3px rgba(200,85,106,0.1);
  }
  .form-group textarea { resize:vertical; min-height:70px; }
  .form-actions { display:flex; gap:12px; margin-top:18px; justify-content:flex-end; }
  .btn { padding:10px 24px; border-radius:9px; font-family:inherit; font-size:0.85rem; font-weight:700; cursor:pointer; transition:all 0.2s; border:none; }
  .btn-primary { background:linear-gradient(135deg,var(--rose),var(--rose-dark)); color:white; box-shadow:0 4px 12px rgba(200,85,106,0.3); }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(200,85,106,0.4); }
  .btn-secondary { background:white; color:var(--text); border:1.5px solid var(--border); }
  .btn-secondary:hover { border-color:var(--rose); color:var(--rose); }
  .btn-teal { background:linear-gradient(135deg,var(--teal),#1A6B5E); color:white; box-shadow:0 4px 12px rgba(46,139,122,0.3); }
  .btn-teal:hover { transform:translateY(-1px); }

  /* ===== DATA PASIEN ===== */
  .search-bar { display:flex; gap:12px; margin-bottom:20px; }
  .search-input-wrap { position:relative; flex:1; }
  .search-input-wrap svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--text-muted); }
  .search-input-wrap input { width:100%; padding:10px 14px 10px 40px; border:1.5px solid var(--border); border-radius:10px; font-family:inherit; font-size:0.88rem; background:white; transition:all 0.2s; }
  .search-input-wrap input:focus { outline:none; border-color:var(--rose); box-shadow:0 0 0 3px rgba(200,85,106,0.1); }
  .btn-search { padding:10px 20px; background:var(--rose); color:white; border:none; border-radius:10px; font-family:inherit; font-weight:700; cursor:pointer; font-size:0.85rem; }
  .data-table-wrap { background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
  table { width:100%; border-collapse:collapse; }
  thead { background:linear-gradient(135deg,var(--navy),var(--navy-mid)); }
  thead th { padding:12px 16px; font-size:0.75rem; font-weight:700; color:white; text-align:left; letter-spacing:0.03em; }
  tbody tr { border-bottom:1px solid var(--border); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:var(--rose-pale); }
  tbody td { padding:12px 16px; font-size:0.83rem; color:var(--text); }
  .tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; }
  .tag-anc { background:#FDE8F4; color:#C0186C; }
  .tag-inc { background:var(--rose-pale); color:var(--rose-dark); }
  .tag-pnc { background:#FEF1EA; color:#C06030; }
  .tag-kb { background:var(--teal-pale); color:var(--teal); }
  .tag-imunisasi { background:#EBF2FD; color:#2050A0; }
  .tag-bayibalita { background:#F5EAFD; color:#6B20A0; }
  .tag-umum { background:var(--gold-pale); color:#906B00; }
  .tag-rawatinap { background:#EEF1F7; color:var(--navy); }

  /* ===== OPERASIONAL ===== */
  .ops-tabs { display:flex; gap:8px; margin-bottom:20px; }
  .ops-tab { padding:8px 20px; border-radius:8px; font-family:inherit; font-size:0.83rem; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:white; color:var(--text-muted); transition:all 0.2s; }
  .ops-tab.active { background:var(--navy); color:white; border-color:var(--navy); }
  .ops-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .ops-card { background:white; border-radius:var(--radius-lg); padding:22px; box-shadow:var(--shadow); border:1px solid var(--border); }
  .ops-card h3 { font-size:0.9rem; font-weight:700; color:var(--navy); margin-bottom:16px; }
  .stok-list { display:grid; gap:10px; }
  .stok-item { display:flex; align-items:center; gap:12px; padding:12px; border-radius:10px; border:1px solid var(--border); }
  .stok-item.low { border-color:var(--rose); background:var(--rose-pale); }
  .stok-info { flex:1; }
  .stok-info .sitem-name { font-size:0.85rem; font-weight:600; color:var(--navy); }
  .stok-info .sitem-detail { font-size:0.73rem; color:var(--text-muted); margin-top:2px; }
  .stok-qty { font-size:1.1rem; font-weight:800; color:var(--navy); }
  .stok-item.low .stok-qty { color:var(--rose); }
  .stok-warn { font-size:0.68rem; font-weight:700; color:var(--rose); background:var(--rose-muted); padding:2px 7px; border-radius:10px; margin-top:3px; display:block; }

  /* ===== MODAL ===== */
  .modal-overlay { position:fixed; inset:0; background:rgba(26,43,74,0.5); z-index:200; display:none; align-items:center; justify-content:center; padding:16px; }
  .modal-overlay.open { display:flex; }
  .modal { background:white; border-radius:var(--radius-lg); width:640px; max-width:100%; max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(26,43,74,0.2); animation:fadeUp 0.3s ease; }
  .modal-header { padding:22px 24px 18px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:white; z-index:1; }
  .modal-header h3 { font-family:'Lora',serif; font-size:1.05rem; font-weight:600; color:var(--navy); }
  .modal-close { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .modal-close:hover { background:var(--rose-pale); border-color:var(--rose); }
  .modal-body { padding:24px; }

  /* ===== TOAST ===== */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--navy); color:white; padding:13px 20px; border-radius:12px; font-size:0.85rem; font-weight:600; box-shadow:0 8px 24px rgba(26,43,74,0.3); z-index:300; display:none; animation:slideIn 0.3s ease; }
  .toast.success { background:var(--teal); }
  .toast.error { background:var(--rose-dark); }
  .toast.warning { background:var(--gold); color:var(--navy); }
  .toast.show { display:block; }

  /* ===== NOTIF PANEL ===== */
  .notif-panel { position:fixed; top:60px; right:16px; width:320px; background:white; border-radius:var(--radius-lg); box-shadow:var(--shadow-lg); border:1px solid var(--border); z-index:90; display:none; animation:fadeUp 0.2s ease; }
  .notif-panel.open { display:block; }
  .notif-header { padding:14px 16px 10px; border-bottom:1px solid var(--border); font-size:0.85rem; font-weight:700; color:var(--navy); }
  .notif-item { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; }
  .notif-item:last-child { border-bottom:none; }
  .notif-dot { width:8px; height:8px; border-radius:50%; background:var(--rose); flex-shrink:0; margin-top:5px; }
  .notif-text { font-size:0.8rem; color:var(--text); line-height:1.4; }
  .notif-time { font-size:0.7rem; color:var(--text-muted); margin-top:3px; }

  /* ===== EMPTY STATE ===== */
  .empty-state { text-align:center; padding:48px 24px; color:var(--text-muted); }
  .empty-state svg { width:48px; height:48px; margin:0 auto 12px; opacity:0.3; display:block; }
  .empty-state p { font-size:0.9rem; }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }

  @media (max-width:768px) {
    :root { --sidebar-w:0px; }
    .sidebar { transform:translateX(-100%); transition:transform 0.3s; }
    .sidebar.open { transform:translateX(0); }
    .main { margin-left:0; }
    .ops-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 100 20A10 10 0 0012 2zm0 3a3 3 0 110 6 3 3 0 010-6zm0 14.2a7.2 7.2 0 01-6-3.22c.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08a7.2 7.2 0 01-6 3.22z"/></svg>
      </div>
      <h1>PMB Pipit Uly Arta</h1>
      <p>Praktik Mandiri Bidan</p>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Masukkan username" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>

<!-- MODAL TAMBAH STOK -->
<div class="modal-overlay" id="modal-stok">
  <div class="modal">
    <div class="modal-header">
      <h3>Tambah Item Stok</h3>
      <button class="modal-close" onclick="closeModal('modal-stok')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group" style="margin-bottom:14px">
        <label>Nama Item <span class="req" style="color:var(--rose)">*</span></label>
        <input type="text" id="new-item-name" placeholder="Nama obat/vaksin/barang">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Kategori <span class="req" style="color:var(--rose)">*</span></label>
        <select id="new-item-cat">
          <option value="obat">Obat</option>
          <option value="vaksin">Vaksin</option>
          <option value="bhp">Barang Habis Pakai</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Stok Awal</label>
        <input type="number" id="new-item-qty" min="0" value="0">
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Batas Minimal Stok</label>
        <input type="number" id="new-item-min" min="1" value="5">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Satuan</label>
        <input type="text" id="new-item-unit" placeholder="tablet, botol, pcs, dll">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="saveNewItem()">Tambah Item</button>
    </div>
  </div>
</div>

<!-- NOTIF PANEL -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-header">Notifikasi Stok</div>
  <div id="notif-list"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
  // Init
  updateTopbarDate();
  setInterval(updateTopbarDate, 60000);

  // Enter key login
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  // Tutup modal saat klik overlay
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
  });

  // Tutup notif saat klik di luar
  document.addEventListener('click', e => {
    if (!e.target.closest('#notif-panel') && !e.target.closest('#notif-badge')) {
      document.getElementById('notif-panel').classList.remove('open');
    }
  });
</script>
</body>
