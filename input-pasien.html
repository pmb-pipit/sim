<div style="display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start">

  <!-- Kolom kiri: menu layanan -->
  <div style="display:flex;flex-direction:column;gap:6px">
    <h3 style="font-family:'Lora',serif;font-size:0.9rem;font-weight:600;color:var(--navy);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)">Pilih Layanan</h3>
    <button class="svc-side-btn" data-service="ANC" onclick="showFormInline('ANC')">
      🤰 ANC <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Antenatal Care</span>
    </button>
    <button class="svc-side-btn" data-service="INC" onclick="showFormInline('INC')">
      🏥 INC <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Intrapartum Care</span>
    </button>
    <button class="svc-side-btn" data-service="PNC" onclick="showFormInline('PNC')">
      💝 PNC <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Postnatal Care</span>
    </button>
    <button class="svc-side-btn" data-service="KB" onclick="showFormInline('KB')">
      📋 KB <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Keluarga Berencana</span>
    </button>
    <button class="svc-side-btn" data-service="IMUNISASI" onclick="showFormInline('IMUNISASI')">
      💉 Imunisasi <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Vaksinasi</span>
    </button>
    <button class="svc-side-btn" data-service="BAYI_BALITA" onclick="showFormInline('BAYI_BALITA')">
      👶 Bayi Balita <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Anak</span>
    </button>
    <button class="svc-side-btn" data-service="UMUM" onclick="showFormInline('UMUM')">
      🩺 Umum <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Pemeriksaan Umum</span>
    </button>
    <button class="svc-side-btn" data-service="RAWAT_INAP" onclick="showFormInline('RAWAT_INAP')">
      🛏️ Rawat Inap <span style="font-size:0.7rem;display:block;color:var(--text-muted);font-weight:400">Perawatan</span>
    </button>
  </div>

  <!-- Kolom kanan: area form -->
  <div id="inline-form-area">
    <div class="empty-state" style="background:white;border-radius:var(--radius-lg);border:1px solid var(--border);padding:60px 24px">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      <p>Pilih layanan di sebelah kiri untuk mulai mengisi data pasien</p>
    </div>
  </div>

</div>
