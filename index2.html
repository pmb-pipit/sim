<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; }
      .sidebar { min-height: 100vh; background: #e83e8c; color: white; }
      .nav-link { color: rgba(255,255,255,.8); }
      .nav-link:hover { color: white; background: rgba(0,0,0,.1); }
      .active-user { font-size: 0.8rem; padding: 10px; border-top: 1px solid rgba(255,255,255,.2); }
      #loginPage { max-width: 400px; margin-top: 100px; }
    </style>
  </head>
  <body>

    <!-- Login Page -->
    <div id="loginPage" class="container card p-4 shadow-sm">
      <h3 class="text-center text-pink">Login PMB Pipit</h3>
      <div class="mb-3">
        <label>Username</label>
        <input type="text" id="user" class="form-control">
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="pass" class="form-control">
      </div>
      <button class="btn btn-primary w-100" onclick="login()">Masuk</button>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="d-none container-fluid">
      <div class="row">
        <!-- Sidebar -->
        <nav class="col-md-2 d-none d-md-block sidebar p-0">
          <div class="p-3"><h4>PMB Pipit</h4></div>
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('dashboard')">Dashboard</a></li>
            <li class="nav-item">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="collapse" data-bs-target="#menuLayanan">Layanan</a>
              <div class="collapse ps-3" id="menuLayanan">
                <a class="nav-link small" href="#" onclick="loadForm('ANC')">ANC</a>
                <a class="nav-link small" href="#" onclick="loadForm('INC')">INC</a>
                <a class="nav-link small" href="#" onclick="loadForm('PNC')">PNC</a>
                <a class="nav-link small" href="#" onclick="loadForm('KB')">KB</a>
              </div>
            </li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="showSection('dataPasien')">Data Pasien</a></li>
          </ul>
          <div class="active-user mt-auto" id="displayUser"></div>
        </nav>

        <!-- Content -->
        <main class="col-md-10 p-4">
          <div id="contentArea">
            <!-- Dynamic Content Loaded Here -->
            <h1>Selamat Datang</h1>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      let activeUser = "";

      function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        google.script.run.withSuccessHandler(res => {
          if(res.success) {
            activeUser = res.name;
            document.getElementById('loginPage').classList.add('d-none');
            document.getElementById('mainApp').classList.remove('d-none');
            document.getElementById('displayUser').innerText = "User: " + activeUser;
            showSection('dashboard');
          } else {
            alert("Login Gagal!");
          }
        }).checkLogin(u, p);
      }

      function loadForm(type) {
        let html = `<h3>Input Data ${type}</h3><form id="dynamicForm" class="row g-3">`;
        
        // Contoh Field untuk ANC (Bisa dikembangkan sesuai list di prompt)
        const fields = ["Tanggal Kedatangan", "Nama Pasien", "Nama Suami", "HPHT", "Tarif"];
        
        fields.forEach(f => {
          html += `<div class="col-md-6"><label class="form-label">${f}</label>
                   <input type="text" name="${f}" class="form-control" required></div>`;
        });

        html += `<div class="col-12"><button type="button" class="btn btn-success" onclick="saveData('${type}')">Simpan Data</button></div></form>`;
        document.getElementById('contentArea').innerHTML = html;
      }

      function saveData(type) {
        const form = document.getElementById('dynamicForm');
        const data = Object.fromEntries(new FormData(form));
        google.script.run.withSuccessHandler(msg => {
          alert(msg);
          form.reset();
        }).submitData(type, data, activeUser);
      }
    </script>
  </body>
</html>
